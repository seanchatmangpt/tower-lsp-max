[checkpoint]
id = "GALL-CHECKPOINT-003"
name = "Boundary-Receipted Equation Enforcement"
status_target = "ADMITTED_BY_DOGFOOD"

[boundary]
workspace = "."
target = ".tmp_gc003/target"
staging_dir = ".tmp_gc003/staging"
receipt_sink = ".tmp_gc003/receipts"

[equation]
form = "R_B ⊢ A = μ(O*_B)"

[[proofs]]
id = "boundary-digest-required"
kind = "receipt-binding"
field = "boundary_digest"
mutation = "alter_boundary"
expected = "validate_sync_refuses"

