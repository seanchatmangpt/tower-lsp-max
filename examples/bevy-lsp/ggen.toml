[project]
name = "bevy-lsp"
version = "0.1.0"
description = "Bevy Language Server"
authors = ["tower-lsp-max"]
license = "MIT"

[ontology]
source = "schema/domain.ttl"
standard_only = false

[generation]
output_dir = "."

[inference]
rules = [
    { name = "standard-normalization", construct = "CONSTRUCT { ?s ?p ?o } WHERE { ?s ?p ?o } ORDER BY ?s ?p ?o" }
]

[[generation.rules]]
name = "scaffold"
query = { inline = "SELECT ?server_name ?language_id WHERE { BIND(\"bevy\" AS ?server_name) BIND(\"tree_sitter_rust\" AS ?language_id) }" }
template = { file = "/Users/sac/ggen/marketplace/templates/tower-lsp-max/backend.rs.tera" }
output_file = "src/backend.rs"
mode = "Overwrite"

[[generation.rules]]
name = "cli"
query = { inline = "SELECT ?server_name WHERE { BIND(\"bevy\" AS ?server_name) }" }
template = { file = "/Users/sac/ggen/marketplace/templates/tower-lsp-max/cli.rs.tera" }
output_file = "src/main.rs"
mode = "Overwrite"

[[generation.rules]]
name = "semantics"
query = { inline = "SELECT ?server_name WHERE { BIND(\"bevy\" AS ?server_name) }" }
template = { file = "/Users/sac/ggen/marketplace/templates/tower-lsp-max/semantics.rs.tera" }
output_file = "src/semantics.rs"
mode = "Overwrite"

[[generation.rules]]
name = "build"
query = { inline = "SELECT ?tree_sitter_crate WHERE { BIND(\"tree_sitter_rust\" AS ?tree_sitter_crate) }" }
template = { file = "/Users/sac/ggen/marketplace/templates/tower-lsp-max/build.rs.tera" }
output_file = "build.rs"
mode = "Overwrite"
