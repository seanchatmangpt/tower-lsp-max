[package]
name = "gc005-wasm4pm-adapter"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "wasm4pm adapter for gc005 compliance validation"
license.workspace = true
homepage.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true
publish = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasm4pm-compat = { workspace = true }
wasm4pm = { path = "../../../wasm4pm/wasm4pm" }

[dev-dependencies]
tempfile = "3"
sha2 = "0.10"
walkdir = "2"
lsp_max = { package = "lsp-max", path = "../.." }
lsp-types-max = { path = "../../../lsp-types-max" }
url = "2"
