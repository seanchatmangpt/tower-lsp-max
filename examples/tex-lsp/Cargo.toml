[package]
name = "tex-lsp"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "LaTeX model language server example using lsp-max"
license.workspace = true
homepage.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true
publish = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
clap = { version = "4", features = ["derive"] }
clap-noun-verb = "26.6.2"
clap-noun-verb-macros = "26.6.2"
linkme = "0.3"
lsp-max = { path = "../../" }
url = "2.5"
tokio = { version = "1", features = ["full"] }
tree-sitter-latex = { package = "codebook-tree-sitter-latex", version = "0.6.1" }

[build-dependencies]
lsp-max-ast-codegen = { path = "../../crates/lsp-max-adapters/lsp-max-ast-codegen" }
tree-sitter-latex = { package = "codebook-tree-sitter-latex", version = "0.6.1" }
