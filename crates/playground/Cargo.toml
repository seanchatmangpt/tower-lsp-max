[package]
name = "tower-lsp-max-playground"
version = "0.1.0"
edition = "2021"
description = "LSP server providing IDE support for writing tower-lsp-max servers"

[[bin]]
name = "tower-lsp-max-playground"
path = "src/main.rs"

[[bin]]
name = "lsif_demo"
path = "src/bin/lsif_demo.rs"

[lib]
name = "tower_lsp_max_playground"
path = "src/lib.rs"

[dependencies]
tower-lsp-max = { path = "../..", features = ["runtime-tokio"] }
tower-lsp-max-protocol = { path = "../../tower-lsp-max-protocol" }
tower-lsp-max-runtime = { path = "../../tower-lsp-max-runtime" }
tokio = { version = "1.17", features = ["io-std", "macros", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
syn = { version = "2", features = ["full", "visit", "extra-traits"] }
proc-macro2 = { version = "1", features = ["span-locations"] }
toml = "0.8"
ropey = "1"
dashmap = "5"

[dev-dependencies]
tokio-test = "0.4"
