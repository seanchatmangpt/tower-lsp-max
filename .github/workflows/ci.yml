name: CI

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Format check
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Lint check with all features
  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Test suite with 10m timeout
  test:
    name: cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # Documentation build and dead link check
  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Check for dead links (if cargo-deadlinks available)
        run: |
          if cargo install --list | grep -q cargo-deadlinks; then
            cargo deadlinks --check html 2>/dev/null || true
          else
            echo "cargo-deadlinks not installed, skipping dead link check"
          fi

  # Summary job that gates merges
  result:
    name: CI Result
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, docs]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.fmt.result }}" == "failure" ||
                "${{ needs.clippy.result }}" == "failure" ||
                "${{ needs.test.result }}" == "failure" ||
                "${{ needs.docs.result }}" == "failure" ]]; then
            echo "CI checks failed"
            exit 1
          fi
          echo "All CI checks passed"
